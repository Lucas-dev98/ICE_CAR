<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo ICE Car -->
  
  <!-- Background circle for icon -->
  <circle cx="25" cy="30" r="22" fill="#56CCF2" opacity="0.1"/>
  
  <!-- Snowflake icon -->
  <g transform="translate(25, 15)">
    <!-- Center -->
    <circle cx="0" cy="0" r="1.5" fill="#56CCF2"/>
    
    <!-- Main points -->
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#56CCF2" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#56CCF2" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5.6" y1="-5.6" x2="5.6" y2="5.6" stroke="#56CCF2" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5.6" y1="-5.6" x2="-5.6" y2="5.6" stroke="#56CCF2" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Small branches -->
    <line x1="0" y1="-8" x2="-2" y2="-11" stroke="#56CCF2" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="2" y2="-11" stroke="#56CCF2" stroke-width="1" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="-11" y2="-2" stroke="#56CCF2" stroke-width="1" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="-11" y2="2" stroke="#56CCF2" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <!-- Text: ICE -->
  <text x="55" y="38" font-family="Poppins, sans-serif" font-size="28" font-weight="700" fill="#1E3A5F" letter-spacing="1">ICE</text>
  
  <!-- Text: Car (in red) -->
  <text x="130" y="42" font-family="Poppins, sans-serif" font-size="26" font-weight="700" fill="#E63946" letter-spacing="0.5">Car</text>
  
  <!-- Subtitle -->
  <text x="55" y="54" font-family="Poppins, sans-serif" font-size="8" fill="#56CCF2" letter-spacing="1" opacity="0.8">AR CONDICIONADO</text>
</svg>